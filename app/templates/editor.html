{% extends "base.html" %}

{% block title %}{% if article %}Edit Article{% else %}New Article{% endif %} — AI Knowledge Hub{% endblock %}

{% block content %}
<div class="mb-6">
  <a href="/" class="text-sm text-indigo-600 hover:underline">← Back to all articles</a>
</div>

<div class="bg-white border border-gray-200 rounded-xl p-8">
  <h1 class="text-2xl font-bold text-gray-900 mb-6">
    {% if article %}Edit Article{% else %}New Article{% endif %}
  </h1>

  <form id="article-form" class="space-y-5">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Title</label>
      <input type="text" id="title" name="title" required
        value="{{ article.title if article else '' }}"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
        placeholder="e.g. How RAG works in production" />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Summary <span class="text-gray-400 font-normal">(optional)</span></label>
      <input type="text" id="summary" name="summary"
        value="{{ article.summary if article else '' }}"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
        placeholder="One-line description shown on the home page" />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Tags <span class="text-gray-400 font-normal">(comma-separated)</span></label>
      <input type="text" id="tags" name="tags"
        value="{{ article.tags if article else '' }}"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
        placeholder="e.g. RAG, LLM, embeddings" />
    </div>

    <div>
      <div class="flex items-center justify-between mb-1">
        <label class="block text-sm font-medium text-gray-700">Content <span class="text-gray-400 font-normal">(Markdown)</span></label>
        <div class="flex gap-2 text-xs">
          <button type="button" onclick="showTab('write')" id="tab-write"
            class="px-2 py-1 rounded bg-indigo-600 text-white font-medium">Write</button>
          <button type="button" onclick="showTab('preview')" id="tab-preview"
            class="px-2 py-1 rounded bg-gray-100 text-gray-600 hover:bg-gray-200">Preview</button>
        </div>
      </div>
      <textarea id="content" name="content" rows="20"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-indigo-500"
        placeholder="Write your knowledge article in Markdown...">{{ article.content if article else '' }}</textarea>
      <div id="preview-pane" class="hidden border border-gray-200 rounded-lg p-4 prose min-h-[400px] bg-gray-50"></div>
    </div>

    <div class="flex gap-3 pt-2">
      <button type="submit"
        class="bg-indigo-600 text-white px-6 py-2 rounded-lg text-sm font-medium hover:bg-indigo-700 transition">
        {% if article %}Save Changes{% else %}Publish Article{% endif %}
      </button>
      {% if article %}
      <button type="button" onclick="deleteArticle()"
        class="bg-red-50 text-red-600 border border-red-200 px-4 py-2 rounded-lg text-sm font-medium hover:bg-red-100 transition">
        Delete
      </button>
      {% endif %}
      <a href="/" class="px-4 py-2 rounded-lg text-sm text-gray-500 hover:text-gray-700 transition">Cancel</a>
    </div>
  </form>

  <div id="error-msg" class="hidden mt-4 text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-4 py-3"></div>
</div>

<script>
  const IS_EDIT = {{ 'true' if article else 'false' }};
  const SLUG = "{{ article.slug if article else '' }}";

  function showTab(tab) {
    const writeEl = document.getElementById('content');
    const previewEl = document.getElementById('preview-pane');
    const tabWrite = document.getElementById('tab-write');
    const tabPreview = document.getElementById('tab-preview');
    if (tab === 'write') {
      writeEl.classList.remove('hidden');
      previewEl.classList.add('hidden');
      tabWrite.className = 'px-2 py-1 rounded bg-indigo-600 text-white font-medium';
      tabPreview.className = 'px-2 py-1 rounded bg-gray-100 text-gray-600 hover:bg-gray-200';
    } else {
      writeEl.classList.add('hidden');
      previewEl.classList.remove('hidden');
      tabWrite.className = 'px-2 py-1 rounded bg-gray-100 text-gray-600 hover:bg-gray-200';
      tabPreview.className = 'px-2 py-1 rounded bg-indigo-600 text-white font-medium';
      renderPreview();
    }
  }

  async function renderPreview() {
    const content = document.getElementById('content').value;
    const res = await fetch('/api/articles/_preview', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content })
    });
    const { html } = await res.json();
    document.getElementById('preview-pane').innerHTML = html;
    if (window.hljs) document.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
  }

  document.getElementById('article-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const payload = {
      title: document.getElementById('title').value,
      summary: document.getElementById('summary').value,
      content: document.getElementById('content').value,
      tags: document.getElementById('tags').value,
    };
    const url = IS_EDIT ? `/api/articles/${SLUG}` : '/api/articles';
    const method = IS_EDIT ? 'PUT' : 'POST';
    const res = await fetch(url, {
      method,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (res.ok) {
      const data = await res.json();
      window.location.href = `/articles/${data.slug}`;
    } else {
      const err = await res.json();
      const errEl = document.getElementById('error-msg');
      errEl.textContent = err.detail || 'Something went wrong.';
      errEl.classList.remove('hidden');
    }
  });

  async function deleteArticle() {
    if (!confirm('Delete this article? This cannot be undone.')) return;
    const res = await fetch(`/api/articles/${SLUG}`, { method: 'DELETE' });
    if (res.ok) window.location.href = '/';
  }
</script>
{% endblock %}
